<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="KWHEJtSq8sWa2G2rxJUnN9VICj7_CzYNBsGhz5zTIVU" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | David Taylor</title>
  <meta name="description" content="Get in touch with David Taylor — Colorist &amp; Finishing Supervisor.">

  <link rel="stylesheet" href="style.css">
  <style>
    .contact-page {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .contact-heading {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 36px;
    }

    .contact-field {
      margin-bottom: 20px;
    }

    .contact-field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaaaaa;
      margin-bottom: 7px;
    }

    .contact-field input,
    .contact-field textarea {
      width: 100%;
      background: #252525;
      border: 1px solid #333;
      color: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .contact-field input:focus,
    .contact-field textarea:focus {
      border-color: #666;
    }

    .contact-field textarea {
      height: 140px;
      resize: vertical;
    }

    .contact-submit {
      width: 100%;
      background: none;
      border: 1px solid #ffffff;
      color: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 13px 20px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-top: 8px;
    }

    .contact-submit:hover {
      background: #ffffff;
      color: #1c1c1c;
    }

    .contact-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .contact-status {
      margin-top: 20px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #aaaaaa;
      letter-spacing: 0.06em;
    }

    .contact-status.success { color: #ffffff; }
    .contact-status.error   { color: #cc4444; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="site-title">David Taylor</a>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="nav-menu">
    <a href="color.html">Color</a>
    <a href="finishing.html">Finishing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="nav-overlay"></div>

  <main class="page-content">
    <div class="contact-page">

      <p class="contact-heading">Get In Touch</p>

      <div class="contact-field">
        <label for="contact-name">Name</label>
        <input type="text" id="contact-name" name="name" autocomplete="name" required>
      </div>

      <div class="contact-field">
        <label for="contact-email">Email</label>
        <input type="email" id="contact-email" name="email" autocomplete="email" required>
      </div>

      <div class="contact-field">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" required></textarea>
      </div>

      <button class="contact-submit" id="contact-submit">Send Message</button>
      <p class="contact-status" id="contact-status"></p>

    </div>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://www.instagram.com/daevud/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="https://www.linkedin.com/in/david-taylor-09aa446" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
        </svg>
      </a>
      <a href="mailto:daevud@gmail.com" aria-label="Contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </a>
    </div>
    <p>&copy; All rights reserved</p>
  </footer>

  <script src="nav.js"></script>
  <script>
    const btn    = document.getElementById('contact-submit');
    const status = document.getElementById('contact-status');

    btn.addEventListener('click', async () => {
      const name    = document.getElementById('contact-name').value.trim();
      const email   = document.getElementById('contact-email').value.trim();
      const message = document.getElementById('contact-message').value.trim();

      if (!name || !email || !message) {
        status.textContent = 'Please fill in all fields.';
        status.className = 'contact-status error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';
      status.textContent = '';
      status.className = 'contact-status';

      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_key: '8718cd81-5a13-4d2d-95cb-b98f49f6db60',
            name,
            email,
            message,
            subject: 'New message from daevud.com'
          })
        });

        const data = await res.json();

        if (data.success) {
          status.textContent = 'Message sent. Thank you.';
          status.className = 'contact-status success';
          document.getElementById('contact-name').value    = '';
          document.getElementById('contact-email').value   = '';
          document.getElementById('contact-message').value = '';
          btn.textContent = 'Send Message';
          btn.disabled = false;
        } else {
          throw new Error('Submission failed');
        }
      } catch {
        status.textContent = 'Something went wrong. Please try again or email daevud@gmail.com.';
        status.className = 'contact-status error';
        btn.textContent = 'Send Message';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
